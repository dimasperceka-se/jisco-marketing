# JISCo marketing site — nginx server block
# Static SPA built by Vite. Docroot points at the build output inside the repo.
# Install: copy to /etc/nginx/sites-available/jisco.online and symlink into sites-enabled.

server {
    listen 80;
    listen [::]:80;
    server_name jisco.online www.jisco.online;

    root /var/www/jisco.online/artifacts/jisco-website/dist/public;
    index index.html;

    # Compression
    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/font-woff2;

    # Hashed build assets — safe to cache forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # SPA fallback — every unknown path serves index.html (client-side routing)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Don't cache the HTML entry so deploys take effect immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
